[project]
name = "medgemma-pipeline"
version = "0.4.0"
description = "Analyze medical text, 2D images, and 3D CT volumes with the Google MedGemma 1.5 model on Apple Silicon with MLX."
readme = "README.md"
requires-python = "==3.12.*"
dependencies = [
    "mlx-vlm",
    "numpy>=2.4.4",
    "pillow",
    "pydicom>=3.0.2",
    "python-dotenv",
    "streamlit>=1.56",
]

[dependency-groups]
dev = [
    "pytest",
    "ruff",
    "ty",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
