[project]
name = "medgemma-pipeline"
version = "0.1.0"
description = "Analyze medical text and images with the Google MedGemma 1.5 model on Apple Silicon with MLX."
readme = "README.md"
requires-python = "==3.12.*"
dependencies = [
    "mlx-vlm",
    "pillow",
    "python-dotenv",
    "streamlit>=1.56",
]

[dependency-groups]
dev = [
    "pytest",
    "ruff",
    "ty",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
