name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read             # CI reads code, pushes nothing — least privilege

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-15          # Apple Silicon (arm64) — matches dev + prod
    timeout-minutes: 15        # ~11s suite; cap a hung uv sync / pytest at minutes, not 6h
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync (locked)
        run: uv sync --locked        # dev group is synced by default; fails if uv.lock is stale

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check

      - name: Tests
        run: uv run pytest
